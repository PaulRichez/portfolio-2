server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # llms.txt (convention llmstxt.org) : généré par Strapi, exposé à la racine
    # du domaine pour les crawlers IA / les fetch sans JS.
    location = /llms.txt {
        proxy_pass http://strapi:1337/api/me/llms.txt;
        proxy_set_header Host $host;
    }

    # sitemap.xml généré par Strapi (en phase avec les routes du VFS).
    location = /sitemap.xml {
        proxy_pass http://strapi:1337/api/me/sitemap.xml;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Configuration spécifique pour l'API (Streaming/SSE)
    location /api/ {
        proxy_pass http://strapi:1337; # Adapt if backend service name/port differs in prod
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Crucial pour le streaming (Server-Sent Events)
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        gzip off;
    }
}
