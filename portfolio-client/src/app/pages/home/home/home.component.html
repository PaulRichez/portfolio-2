<div *ngIf="loading" class="flex justify-center items-center min-h-[200px]">
  <i class="pi pi-spin pi-spinner text-4xl text-primary"></i>
</div>

<div *ngIf="!loading" class="w-full max-w-6xl mx-auto flex flex-col gap-12 p-4">
  <app-me id="about" class="scroll-mt-24" [me]="me"></app-me>

  <app-projects id="projects" class="scroll-mt-24" [projects]="me?.projects || []"></app-projects>

  <app-experiences id="experience" class="scroll-mt-24" [experiences]="me?.experiences || []"></app-experiences>

  <app-education id="education" class="scroll-mt-24" [diplomas]="me?.diplomas || []"></app-education>

  <app-codings id="skills" class="scroll-mt-24" [coding_skills]="me?.coding_skills || []"></app-codings>

</div>
