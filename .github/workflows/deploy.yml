name: build-deploy

# Build des images sur les runners GitHub (rapides) → push sur ghcr.io.
# Coolify ne fait que PULL l'image déjà construite (pas de build sur le N100).
on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Owner en minuscules (ghcr l'exige)
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — front (Angular)
        uses: docker/build-push-action@v6
        with:
          context: ./portfolio-client
          file: ./portfolio-client/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/portfolio-2-client:latest
            ghcr.io/${{ steps.owner.outputs.name }}/portfolio-2-client:${{ github.sha }}

      - name: Build & push — back (Strapi)
        uses: docker/build-push-action@v6
        with:
          context: ./portfolio-server
          file: ./portfolio-server/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/portfolio-2-server:latest
            ghcr.io/${{ steps.owner.outputs.name }}/portfolio-2-server:${{ github.sha }}

      - name: Déclencher le déploiement Coolify (pull + restart)
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          echo "WEBHOOK défini : $([ -n "$COOLIFY_WEBHOOK" ] && echo oui || echo NON)"
          echo "TOKEN défini   : $([ -n "$COOLIFY_TOKEN" ] && echo oui || echo NON)"
          if [ -z "$COOLIFY_WEBHOOK" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "::warning::Secret(s) manquant(s) — pas d'appel webhook."; exit 0
          fi
          # Masque la query (uuid) mais montre le host appelé
          echo "Appel : $(echo "$COOLIFY_WEBHOOK" | sed 's/?.*$/?***/')"
          code=$(curl -sS -o /tmp/resp -w "%{http_code}" -X GET "$COOLIFY_WEBHOOK" -H "Authorization: Bearer $COOLIFY_TOKEN" || echo "000")
          echo "HTTP $code"
          echo "Réponse Coolify :"; cat /tmp/resp 2>/dev/null | head -c 800; echo
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::warning::Coolify a répondu $code (≠ 2xx) — le déploiement ne s'est pas déclenché."
          fi
