version: "3.8"

services:
  # Angular Frontend
  angular:
    build:
      context: ./portfolio-client
      dockerfile: Dockerfile
    container_name: portfolio-angular
    ports:
      - "3000:80"
    depends_on:
      - strapi
    restart: unless-stopped
    networks:
      - portfolio_network

  # Strapi Backend (Default with SQLite)
  strapi:
    build:
      context: ./portfolio-server
      dockerfile: Dockerfile
    container_name: portfolio-strapi
    ports:
      - "1337:1337"
    volumes:
      - strapi_data:/app/.tmp
      - strapi_uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_CLIENT=sqlite
      - DATABASE_FILENAME=.tmp/data.db
      - HOST=0.0.0.0
      - PORT=1337
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - APP_KEYS=${APP_KEYS}
      # --- LLM chatbot ---
      # Chat = Zhipu GLM-4-Flash (cloud). Le CV complet est injecté dans le prompt
      # (pas de RAG, pas de ChromaDB, aucun modèle local).
      - LLM_PROVIDER=${LLM_PROVIDER:-zhipu}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ZHIPU_MODEL_NAME=${ZHIPU_MODEL_NAME:-glm-4-flash}
    restart: unless-stopped
    networks:
      - portfolio_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:1337/_health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Strapi with PostgreSQL
  strapi-postgres:
    build:
      context: ./portfolio-server
      dockerfile: Dockerfile
    container_name: portfolio-strapi-postgres
    ports:
      - "1337:1337"
    volumes:
      - strapi_uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB}
      - DATABASE_USERNAME=${POSTGRES_USER}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - HOST=0.0.0.0
      - PORT=1337
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - APP_KEYS=${APP_KEYS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - portfolio_network
    profiles: [ "postgres" ]

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: portfolio-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - portfolio_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # NOTE: Ollama + ChromaDB removed — the chatbot no longer uses RAG/embeddings.
  # The full CV is injected into the prompt and chat generation runs on Zhipu (cloud),
  # so the host runs no local AI model.

  # NOTE: reverse proxy + SSL are handled by Coolify (Traefik + Let's Encrypt).
  # The old nginx + certbot services were removed — they would clash with
  # Coolify's Traefik on ports 80/443. Coolify routes the domains to the
  # `angular` (port 80) and `strapi` (port 1337) services directly.

volumes:
  strapi_data:
    driver: local
  strapi_uploads:
    driver: local
  postgres_data:
    driver: local

networks:
  portfolio_network:
    driver: bridge
