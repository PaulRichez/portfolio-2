version: "3.8"

services:
  # Angular Frontend — image construite par GitHub Actions (ghcr.io), Coolify la pull.
  angular:
    image: ghcr.io/paulrichez/portfolio-2-client:latest
    container_name: portfolio-angular
    ports:
      - "3000:80"
    depends_on:
      - strapi
    restart: unless-stopped
    networks:
      - portfolio_network

  # Strapi Backend (SQLite) — image construite par GitHub Actions (ghcr.io), Coolify la pull.
  strapi:
    image: ghcr.io/paulrichez/portfolio-2-server:latest
    container_name: portfolio-strapi
    ports:
      - "1337:1337"
    volumes:
      - strapi_data:/app/.tmp
      - strapi_uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_CLIENT=sqlite
      - DATABASE_FILENAME=.tmp/data.db
      - HOST=0.0.0.0
      - PORT=1337
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
      - APP_KEYS=${APP_KEYS}
      # --- Chatbot IA ---
      # Chat = Zhipu GLM-4.5-Flash (cloud, gratuit). Assistant agentique : il lit
      # le système de fichiers virtuel du portfolio via des tool calls (read_file /
      # open_file). Aucun modèle local, pas de RAG.
      - LLM_PROVIDER=${LLM_PROVIDER:-zhipu}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ZHIPU_MODEL_NAME=${ZHIPU_MODEL_NAME:-glm-4.5-flash}
    restart: unless-stopped
    networks:
      - portfolio_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:1337/_health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # NOTE: Strapi tourne en SQLite (volume strapi_data). Les anciens services
  # postgres/strapi-postgres ont été retirés : Coolify ne respectait pas le
  # `profiles` et lançait un postgres en crash-loop. Pour passer en Postgres,
  # utiliser une base Coolify dédiée + DATABASE_CLIENT=postgres en variables.

  # NOTE: Ollama + ChromaDB removed — the chatbot no longer uses RAG/embeddings.
  # The full CV is injected into the prompt and chat generation runs on Zhipu (cloud),
  # so the host runs no local AI model.

  # NOTE: reverse proxy + SSL are handled by Coolify (Traefik + Let's Encrypt).
  # The old nginx + certbot services were removed — they would clash with
  # Coolify's Traefik on ports 80/443. Coolify routes the domains to the
  # `angular` (port 80) and `strapi` (port 1337) services directly.

volumes:
  strapi_data:
    driver: local
  strapi_uploads:
    driver: local

networks:
  portfolio_network:
    driver: bridge
